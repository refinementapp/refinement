<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinement — Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .container { width: 100%; max-width: 390px; padding: 2rem 1.25rem; }

    .settings-btn-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }

    .settings-btn {
      background: transparent;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
    }

    .profile-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #6C5CE7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 1rem;
      overflow: hidden;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name { font-size: 22px; font-weight: 800; margin-bottom: 0.25rem; }
    .profile-tag { font-size: 13px; color: #6C5CE7; margin-bottom: 0.25rem; }
    .profile-joined { font-size: 12px; color: #555; }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
      margin-top: 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card.highlight {
      border-color: #6C5CE7;
      background: rgba(108,92,231,0.1);
    }

    .stat-icon { font-size: 24px; margin-bottom: 0.5rem; }
    .stat-number { font-size: 28px; font-weight: 800; color: white; }
    .stat-number.purple { color: #6C5CE7; }
    .stat-label { font-size: 11px; color: #666; margin-top: 0.25rem; }

    .habit-stat-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 0.75rem;
    }

    .habit-stat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .habit-stat-name { font-size: 16px; font-weight: 700; text-transform: capitalize; }
    .habit-stat-streak { font-size: 13px; color: #6C5CE7; font-weight: 700; }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #2a2a2a;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: #6C5CE7;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .next-milestone { font-size: 11px; color: #555; }

    .milestone-badges {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .badge {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      text-align: center;
      flex: 1;
      min-width: 80px;
    }

    .badge.earned {
      border-color: #6C5CE7;
      background: rgba(108,92,231,0.1);
    }

    .badge-icon { font-size: 24px; margin-bottom: 0.25rem; }
    .badge-label { font-size: 11px; color: #888; }
    .badge.earned .badge-label { color: #6C5CE7; }

    .share-btn {
      width: 100%;
      background: #6C5CE7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1.5rem;
    }

    .share-btn:active { opacity: 0.85; }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #111;
      border-top: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-around;
      padding: 0.75rem 0 1rem;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      color: #666;
      font-size: 11px;
    }

    .nav-item.active { color: #6C5CE7; }
    .nav-icon { font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">

    <div class="settings-btn-row">
      <button class="settings-btn" onclick="window.location.href='settings.html'">⚙️ Settings</button>
    </div>

    <div class="profile-header">
      <div class="avatar" id="avatar">👤</div>
      <div class="profile-name" id="profileName">Loading...</div>
      <div class="profile-tag" id="profileTag"></div>
      <div class="profile-joined" id="profileJoined"></div>
    </div>

    <div class="section-title">Your Stats</div>
    <div class="stats-grid">
      <div class="stat-card highlight">
        <div class="stat-icon">🔥</div>
        <div class="stat-number purple" id="totalStreakDays">0</div>
        <div class="stat-label">total streak days</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👊</div>
        <div class="stat-number" id="urgesOvercome">0</div>
        <div class="stat-label">urges overcome</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚡</div>
        <div class="stat-number" id="longestStreak">0</div>
        <div class="stat-label">longest streak ever</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-number" id="totalHabits">0</div>
        <div class="stat-label">habits tracked</div>
      </div>
    </div>

    <div class="section-title">Your Habits</div>
    <div id="habitStats"></div>

    <div class="section-title">Milestone Badges</div>
    <div class="milestone-badges" id="milestoneBadges"></div>

    <button class="share-btn" onclick="shareProfile()">Share my progress 💪</button>

  </div>

  <div class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='home.html'">
      <div class="nav-icon">🏠</div>
      Today
    </div>
    <div class="nav-item" onclick="window.location.href='community.html'">
      <div class="nav-icon">👥</div>
      Community
    </div>
    <div class="nav-item" onclick="window.location.href='log.html'">
      <div class="nav-icon">📓</div>
      Log
    </div>
    <div class="nav-item active">
      <div class="nav-icon">👤</div>
      Profile
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    var habits = JSON.parse(localStorage.getItem('habits') || '[]');
    var urgesOvercome = parseInt(localStorage.getItem('urgesOvercome') || '0');

    var username = localStorage.getItem('username') || 'User';
    var displayName = localStorage.getItem('displayName') || username;
    document.getElementById('profileName').textContent = username;
    document.getElementById('profileTag').textContent = displayName;

    auth.onAuthStateChanged(function(user) {
      if (user && user.photoURL) {
        document.getElementById('avatar').innerHTML = '<img src="' + user.photoURL + '" />';
      }
      if (user && user.metadata && user.metadata.creationTime) {
        var joined = new Date(user.metadata.creationTime);
        document.getElementById('profileJoined').textContent = 'Member since ' + joined.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      }
    });

    var totalDays = habits.reduce(function(sum, h) { return sum + h.streak; }, 0);
    var longestStreak = habits.reduce(function(max, h) { return Math.max(max, h.streak); }, 0);

    document.getElementById('totalStreakDays').textContent = totalDays;
    document.getElementById('urgesOvercome').textContent = urgesOvercome;
    document.getElementById('longestStreak').textContent = longestStreak;
    document.getElementById('totalHabits').textContent = habits.length;

    var habitStatsEl = document.getElementById('habitStats');
    if (habits.length === 0) {
      habitStatsEl.innerHTML = '<div style="color:#555; font-size:14px; text-align:center; padding:1rem;">No habits yet.</div>';
    } else {
      habits.forEach(function(habit) {
        var milestones = [7, 30, 90];
        var nextMilestone = milestones.find(function(m) { return m > habit.streak; }) || 90;
        var prevMilestone = milestones.filter(function(m) { return m <= habit.streak; }).pop() || 0;
        var progress = Math.min(((habit.streak - prevMilestone) / (nextMilestone - prevMilestone)) * 100, 100);
        var daysLeft = nextMilestone - habit.streak;

        var card = document.createElement('div');
        card.className = 'habit-stat-card';
        card.innerHTML =
          '<div class="habit-stat-top">' +
            '<div class="habit-stat-name">' + habit.name + '</div>' +
            '<div class="habit-stat-streak">🔥 ' + habit.streak + ' days</div>' +
          '</div>' +
          '<div class="progress-bar-bg">' +
            '<div class="progress-bar-fill" style="width:' + progress + '%"></div>' +
          '</div>' +
          '<div class="next-milestone">' +
            (habit.streak >= 90
              ? '🏆 All milestones reached'
              : daysLeft + ' days until ' + nextMilestone + ' day milestone') +
          '</div>';
        habitStatsEl.appendChild(card);
      });
    }

    var badgesEl = document.getElementById('milestoneBadges');
    var badgeData = [
      { days: 7, icon: '⚡', label: '7 Days' },
      { days: 30, icon: '🔥', label: '30 Days' },
      { days: 90, icon: '👑', label: '90 Days' }
    ];

    badgeData.forEach(function(badge) {
      var earned = longestStreak >= badge.days;
      var el = document.createElement('div');
      el.className = 'badge' + (earned ? ' earned' : '');
      el.innerHTML =
        '<div class="badge-icon">' + (earned ? badge.icon : '🔒') + '</div>' +
        '<div class="badge-label">' + badge.label + '</div>';
      badgesEl.appendChild(el);
    });

    function shareProfile() {
      var text = 'I\'ve overcome ' + urgesOvercome + ' urges and built a ' + longestStreak + ' day streak on Refinement. Building discipline one moment at a time. 💪\n\nrefinement-seven.vercel.app';
      if (navigator.share) {
        navigator.share({ title: 'My Refinement Progress', text: text });
      } else {
        alert(text);
      }
    }
  </script>
</body>
</html>
