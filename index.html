<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 390px;
      padding: 2rem;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #6C5CE7;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 14px;
      color: #888;
      margin-bottom: 3rem;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 14px;
      color: #888;
      margin-bottom: 2rem;
    }

    input, textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1rem;
      color: white;
      font-size: 15px;
      margin-bottom: 1rem;
      outline: none;
    }

    textarea {
      resize: none;
      height: 100px;
      font-family: system-ui, sans-serif;
    }

    input::placeholder, textarea::placeholder { color: #555; }

    button {
      width: 100%;
      background: #6C5CE7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:active { opacity: 0.85; }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Refinement</div>
    <div class="tagline">Break the cycle. One moment at a time.</div>

    <h2>Add a habit</h2>
    <p>Name a habit you want to break and write your personal reason for quitting it.</p>

    <input type="text" id="habitName" placeholder="e.g. doomscrolling, lust, junk food" />
    <textarea id="habitReason" placeholder="Why do you want to quit this? Be honest with yourself."></textarea>
    <div class="error" id="errorMsg">Please fill in both fields before continuing.</div>
    <button onclick="saveHabit()">Save & Continue →</button>
  </div>

  <script>
    if (!localStorage.getItem('onboarded')) {
      window.location.href = 'onboarding.html';
    }

    function saveHabit() {
      const name = document.getElementById('habitName').value.trim();
      const reason = document.getElementById('habitReason').value.trim();
      const error = document.getElementById('errorMsg');

      if (!name || !reason) {
        error.style.display = 'block';
        return;
      }

      error.style.display = 'none';

      const habits = JSON.parse(localStorage.getItem('habits') || '[]');
      habits.push({ name, reason, streak: 0, lastUpdated: null, lastSlipDate: null });
      localStorage.setItem('habits', JSON.stringify(habits));

      window.location.href = 'splash.html';
    }
  </script>
</body>
</html>
