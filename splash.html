<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .logo-icon {
      font-size: 80px;
      margin-bottom: 1rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      color: white;
      margin-bottom: 0.5rem;
    }

    .logo-text span { color: #6C5CE7; }

    .tagline {
      font-size: 14px;
      color: #888;
    }

    .loader {
      margin-top: 3rem;
      width: 40px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: #6C5CE7;
      border-radius: 2px;
      animation: load 1.8s ease forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Refine<span>ment</span></div>
    <div class="tagline">Break the cycle. One moment at a time.</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    function routeUser() {
      if (!localStorage.getItem('onboarded')) {
        var localHabits = JSON.parse(localStorage.getItem('habits') || '[]');
        if (localHabits.length > 0) {
          localStorage.setItem('onboarded', 'true');
          window.location.href = 'home.html';
          return;
        }
        window.location.href = 'onboarding.html';
        return;
      }

      var habits = JSON.parse(localStorage.getItem('habits') || '[]');

      if (habits.length > 0) {
        window.location.href = 'home.html';
        return;
      }

      // No local habits — check if signed in and has cloud habits
      auth.onAuthStateChanged(function(user) {
        if (user) {
          db.collection('users').doc(user.uid).get().then(function(doc) {
            if (doc.exists && doc.data().habits && doc.data().habits.length > 0) {
              localStorage.setItem('habits', JSON.stringify(doc.data().habits));
              if (doc.data().username) localStorage.setItem('username', doc.data().username);
              if (doc.data().displayName) localStorage.setItem('displayName', doc.data().displayName);
              window.location.href = 'home.html';
            } else {
              window.location.href = 'index.html';
            }
          }).catch(function() {
            window.location.href = 'index.html';
          });
        } else if (!localStorage.getItem('skippedSignIn')) {
          window.location.href = 'signin.html';
        } else {
          window.location.href = 'index.html';
        }
      });
    }

    setTimeout(routeUser, 2000);
  </script>
</body>
</html>
