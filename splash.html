<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinement</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .logo-icon {
      font-size: 80px;
      margin-bottom: 1rem;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      color: white;
      margin-bottom: 0.5rem;
    }

    .logo-text span { color: #6C5CE7; }

    .tagline {
      font-size: 14px;
      color: #888;
    }

    .loader {
      margin-top: 3rem;
      width: 40px;
      height: 4px;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      margin-left: auto;
      margin-right: auto;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: #6C5CE7;
      border-radius: 2px;
      animation: load 1.8s ease forwards;
    }

    @keyframes load {
      to { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-icon">🧠</div>
    <div class="logo-text">Refine<span>ment</span></div>
    <div class="tagline">Break the cycle. One moment at a time.</div>
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
  </div>

  <script>
    setTimeout(function() {
      if (!localStorage.getItem('onboarded')) {
        window.location.href = 'onboarding.html';
      } else if (!localStorage.getItem('habits') || JSON.parse(localStorage.getItem('habits')).length === 0) {
        window.location.href = 'index.html';
      } else {
        window.location.href = 'home.html';
      }
    }, 2000);
  </script>
</body>
</html>
