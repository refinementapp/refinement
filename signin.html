<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refinement — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0f0f0f;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 390px;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .icon {
      font-size: 72px;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    h2 span { color: #6C5CE7; }

    .subtitle {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .benefits {
      text-align: left;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 2rem;
    }

    .benefit-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      font-size: 14px;
      color: #ccc;
    }

    .benefit-item:last-child { margin-bottom: 0; }

    .benefit-icon { font-size: 20px; }

    .google-btn {
      width: 100%;
      background: white;
      color: #111;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .google-btn:active { opacity: 0.85; }

    .google-icon {
      width: 20px;
      height: 20px;
    }

    .skip-btn {
      width: 100%;
      background: transparent;
      color: #555;
      border: none;
      padding: 0.75rem;
      font-size: 14px;
      cursor: pointer;
    }

    .skip-btn:active { opacity: 0.85; }

    .status {
      font-size: 13px;
      color: #6C5CE7;
      margin-top: 1rem;
      display: none;
    }

    .error {
      font-size: 13px;
      color: #ff6b6b;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔐</div>
    <h2>Save your <span>progress</span></h2>
    <div class="subtitle">
      Sign in with Google to save your habits and streaks across all your devices.
    </div>

    <div class="benefits">
      <div class="benefit-item">
        <div class="benefit-icon">☁️</div>
        Your streaks and habits saved to the cloud
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">📱</div>
        Access your data on any device
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">👥</div>
        Join and create accountability groups
      </div>
      <div class="benefit-item">
        <div class="benefit-icon">🔒</div>
        Your habits stay completely private
      </div>
    </div>

    <button class="google-btn" onclick="handleGoogleSignIn()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <button class="skip-btn" onclick="skipSignIn()">
      Continue without signing in
    </button>

    <div class="status" id="status">Signing in...</div>
    <div class="error" id="error"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script>
    // Check if already signed in
    auth.onAuthStateChanged(function(user) {
      if (user) {
        window.location.href = 'home.html';
      }
    });

    function handleGoogleSignIn() {
      var status = document.getElementById('status');
      var error = document.getElementById('error');
      status.style.display = 'block';
      error.style.display = 'none';

      signInWithGoogle().then(function(result) {
        var user = result.user;
        var username = localStorage.getItem('username') || user.displayName || 'User';

        return saveUserData(user.uid, {
          username: username,
          email: user.email,
          photoURL: user.photoURL,
          createdAt: new Date().toISOString()
        });
      }).then(function() {
        var user = getCurrentUser();
        var habits = JSON.parse(localStorage.getItem('habits') || '[]');
        if (habits.length > 0) {
          return saveHabits(user.uid, habits);
        }
      }).then(function() {
        window.location.href = 'home.html';
      }).catch(function(err) {
        status.style.display = 'none';
        error.style.display = 'block';
        error.textContent = 'Error signing in: ' + err.message;
      });
    }

    function skipSignIn() {
      localStorage.setItem('skippedSignIn', 'true');
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
